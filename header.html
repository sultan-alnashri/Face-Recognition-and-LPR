<style>
    .fr-header {
        background: rgba(5, 7, 10, 0.96);
        color: #ffffff;
        padding: 15px 36px;
        border-bottom: 1px solid rgba(96, 165, 250, 0.25);
        font-family: Arial, sans-serif;
        position: sticky;
        top: 0;
        z-index: 1000;
        backdrop-filter: blur(14px);
        box-shadow: 0 10px 35px rgba(0, 0, 0, 0.35);
    }

    .fr-header-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 24px;
    }

    .brand-box {
        display: flex;
        align-items: center;
        gap: 14px;
        text-decoration: none;
        color: white;
    }

    .brand-mark {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        background: linear-gradient(135deg, #0b2f5b, #c1121f);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        color: white;
        box-shadow: 0 0 22px rgba(193, 18, 31, 0.35);
    }

    .brand-title {
        font-size: 22px;
        font-weight: bold;
        letter-spacing: 0.5px;
    }

    .brand-title span {
        color: #ff3b3b;
    }

    .brand-subtitle {
        font-size: 12px;
        color: #9ca3af;
        margin-top: 4px;
    }

    .fr-nav {
        display: flex;
        gap: 18px;
        align-items: center;
    }

    .fr-nav a {
        color: #d1d5db;
        text-decoration: none;
        font-size: 14px;
        transition: 0.3s;
    }

    .fr-nav a:hover {
        color: #60a5fa;
    }

    .fr-status {
        background: #111827;
        border: 1px solid #374151;
        padding: 8px 14px;
        border-radius: 999px;
        font-size: 13px;
        color: #d1d5db;
        white-space: nowrap;
    }

    .fr-status::before {
        content: "";
        display: inline-block;
        width: 9px;
        height: 9px;
        background: #22c55e;
        border-radius: 50%;
        margin-left: 7px;
        box-shadow: 0 0 10px #22c55e;
    }

    @media (max-width: 900px) {
        .fr-header-container {
            flex-direction: column;
        }

        .fr-nav {
            flex-wrap: wrap;
            justify-content: center;
        }
    }
</style>
